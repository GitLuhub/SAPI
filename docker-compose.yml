version: '3.8'

services:
  # ----------------------------------------
  # API Gateway (Nginx)
  # ----------------------------------------
  nginx:
    image: nginx:latest
    container_name: sapi_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - web_client
    networks:
      - sapi_network
    restart: unless-stopped

  # ----------------------------------------
  # Cliente Web (React)
  # ----------------------------------------
  web_client:
    build:
      context: ./sapi_frontend
      dockerfile: Dockerfile
    container_name: sapi_web_client
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost/api/v1
    networks:
      - sapi_network
    restart: unless-stopped

  # ----------------------------------------
  # Backend Service (FastAPI)
  # ----------------------------------------
  backend:
    build:
      context: ./sapi_backend
      dockerfile: Dockerfile
    container_name: sapi_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://sapi_user:sapi_password@db:5432/sapi_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./sapi_backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sapi_network
    restart: unless-stopped
    command: >
      sh -c "pip install email-validator==2.1.0.post1 bcrypt==4.0.1 psycopg2-binary==2.9.9 && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ----------------------------------------
  # Database Service (PostgreSQL)
  # ----------------------------------------
  db:
    image: postgres:15-alpine
    container_name: sapi_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sapi_user
      POSTGRES_PASSWORD: sapi_password
      POSTGRES_DB: sapi_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - sapi_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapi_user -d sapi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Message Broker (Redis)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sapi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sapi_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # AI Worker Service (Celery Worker)
  # ----------------------------------------
  ai_worker:
    build:
      context: ./sapi_backend
      dockerfile: Dockerfile
    container_name: sapi_ai_worker
    command: >
      sh -c "pip install email-validator==2.1.0.post1 bcrypt==4.0.1 psycopg2-binary==2.9.9 && celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q ai_processing"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://sapi_user:sapi_password@db:5432/sapi_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./sapi_backend:/app
    depends_on:
      - db
      - redis
      - backend
    networks:
      - sapi_network
    restart: unless-stopped

  # ----------------------------------------
  # Notification Worker (Celery Worker)
  # ----------------------------------------
  notification_worker:
    build:
      context: ./sapi_backend
      dockerfile: Dockerfile
    container_name: sapi_notification_worker
    command: >
      sh -c "pip install email-validator==2.1.0.post1 bcrypt==4.0.1 psycopg2-binary==2.9.9 && celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q notifications"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://sapi_user:sapi_password@db:5432/sapi_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./sapi_backend:/app
    depends_on:
      - db
      - redis
    networks:
      - sapi_network
    restart: unless-stopped

  # ----------------------------------------
  # Celery Beat (Scheduler)
  # ----------------------------------------
  celery_beat:
    build:
      context: ./sapi_backend
      dockerfile: Dockerfile
    container_name: sapi_celery_beat
    command: >
      sh -c "pip install email-validator==2.1.0.post1 bcrypt==4.0.1 psycopg2-binary==2.9.9 && celery -A app.tasks.celery_app beat --loglevel=info"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://sapi_user:sapi_password@db:5432/sapi_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./sapi_backend:/app
    depends_on:
      - db
      - redis
    networks:
      - sapi_network
    restart: unless-stopped

# ----------------------------------------
# Volumes for data persistence
# ----------------------------------------
volumes:
  db_data:
  redis_data:

# ----------------------------------------
# Networks
# ----------------------------------------
networks:
  sapi_network:
    driver: bridge
